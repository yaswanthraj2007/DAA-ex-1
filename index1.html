<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Interpolation Search</title>

<style>

body{
    font-family:Arial;
    background:#eef2f7;
    margin:30px;
}

.container{
    width:700px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 15px rgba(0,0,0,.2);
}

h1{
    text-align:center;
    color:#1565c0;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    font-size:16px;
}

button{
    padding:10px 20px;
    background:#1565c0;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0d47a1;
}

table{
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
}

th,td{
    border:1px solid #ccc;
    padding:10px;
    text-align:center;
}

th{
    background:#1565c0;
    color:white;
}

</style>

</head>

<body>

<div class="container">

<h1>Interpolation Search</h1>

<label>Sorted Array (comma separated)</label>

<input id="array"
value="2,5,10,15,23,35,48,60,75,90,105,120">

<label>Target</label>

<input id="target" value="35">

<button onclick="runSearch()">Search</button>

<div id="output"></div>

</div>

<script>

function interpolationSearch(arr,target){

let low=0;
let high=arr.length-1;
let comparisons=0;

while(low<=high && target>=arr[low] && target<=arr[high]){

comparisons++;

if(low===high){

if(arr[low]===target)
return {index:low,comparisons};

return {index:-1,comparisons};

}

if(arr[high]===arr[low]) break;

let pos=low+Math.floor(
((target-arr[low])*(high-low))/
(arr[high]-arr[low])
);

if(arr[pos]===target)
return {index:pos,comparisons};

if(arr[pos]<target)
low=pos+1;
else
high=pos-1;

}

return {index:-1,comparisons};

}


function binarySearch(arr,target){

let low=0;
let high=arr.length-1;
let comparisons=0;

while(low<=high){

comparisons++;

let mid=Math.floor((low+high)/2);

if(arr[mid]===target)
return {index:mid,comparisons};

if(arr[mid]<target)
low=mid+1;
else
high=mid-1;

}

return {index:-1,comparisons};

}


function runSearch(){

let arr=document.getElementById("array").value
.split(",")
.map(Number);

let target=Number(document.getElementById("target").value);

let is=interpolationSearch(arr,target);

let bs=binarySearch(arr,target);

document.getElementById("output").innerHTML=`

<table>

<tr>
<th>Algorithm</th>
<th>Index</th>
<th>Comparisons</th>
</tr>

<tr>
<td>Interpolation Search</td>
<td>${is.index}</td>
<td>${is.comparisons}</td>
</tr>

<tr>
<td>Binary Search</td>
<td>${bs.index}</td>
<td>${bs.comparisons}</td>
</tr>

</table>

`;

}

runSearch();

</script>

</body>
</html>
